version: '3.8'

services:
  # ============================================================================
  # PostgreSQL 15 — Base de datos principal
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: appforge-postgres
    environment:
      POSTGRES_DB: appforge_prod
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Optimizaciones para KVM 2 (8GB RAM disponible para DB)
      POSTGRES_INITDB_ARGS: >
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=16MB
        -c min_wal_size=1GB
        -c max_wal_size=2GB
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de datos
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización
      - ./db-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appforge-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Redis 7 — Cache y BullMQ
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: appforge-redis
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appforge-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # MinIO — S3-compatible Storage (para APKs y artefactos)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: appforge-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BROWSER: "on"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # MinIO S3 API
      - "9001:9001"   # MinIO Console (Web UI)
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - appforge-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nginx — Reverse Proxy y TLS termination
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: appforge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    networks:
      - appforge-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  appforge-network:
    driver: bridge
