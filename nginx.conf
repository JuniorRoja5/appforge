# ============================================================================
# AppForge SaaS — Nginx Configuration
# Reverse Proxy para:
#   - api.creatu.app → localhost:3000 (NestJS API)
#   - app.creatu.app → localhost:5000 (React Builder SPA)
#   - admin.creatu.app → localhost:5001 (React Admin Panel SPA)
#   - storage.creatu.app → localhost:9000 (MinIO S3)
#
# HTTPS con Let's Encrypt (certbot)
# 
# Instalación:
#   1. cp nginx.conf /etc/nginx/sites-available/appforge.conf
#   2. ln -s /etc/nginx/sites-available/appforge.conf /etc/nginx/sites-enabled/appforge.conf
#   3. nginx -t (verificar)
#   4. systemctl reload nginx
#   5. certbot --nginx -d api.creatu.app -d app.creatu.app -d admin.creatu.app
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml font/truetype font/opentype 
             application/vnd.ms-fontobject image/svg+xml;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=500r/m;

  # ============================================================================
  # api.creatu.app → NestJS Backend (localhost:3000)
  # ============================================================================
  upstream appforge_api {
    server localhost:3000;
    keepalive 64;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name api.creatu.app;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.creatu.app;

    # Upload size limit — explicit at server level so it's not silently
    # overridden by other configs in /etc/nginx/conf.d/ or sites-enabled/.
    # Must match Multer limit in upload.controller.ts (100MB).
    client_max_body_size 100M;
    client_body_timeout 120s;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.creatu.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.creatu.app/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    location / {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://appforge_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_request_buffering off;

      # Timeouts para builds largos
      proxy_connect_timeout 60s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
      proxy_pass http://appforge_api;
      access_log off;
    }
  }

  # ============================================================================
  # app.creatu.app → React Builder (localhost:5000)
  # ============================================================================
  upstream appforge_builder {
    server localhost:5000;
    keepalive 64;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name app.creatu.app;

    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.creatu.app;

    ssl_certificate /etc/letsencrypt/live/app.creatu.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.creatu.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      limit_req zone=general_limit burst=50 nodelay;

      proxy_pass http://appforge_builder;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SPA routing: cualquier 404 → index.html
      error_page 404 =200 /index.html;
    }
  }

  # ============================================================================
  # admin.creatu.app → React Admin Panel (localhost:5001)
  # ============================================================================
  upstream appforge_admin {
    server localhost:5001;
    keepalive 64;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name admin.creatu.app;

    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.creatu.app;

    ssl_certificate /etc/letsencrypt/live/admin.creatu.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.creatu.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      limit_req zone=general_limit burst=50 nodelay;

      proxy_pass http://appforge_admin;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SPA routing
      error_page 404 =200 /index.html;
    }
  }

  # ============================================================================
  # storage.creatu.app → MinIO S3 API (localhost:9000)
  # ============================================================================
  upstream appforge_storage {
    server localhost:9000;
    keepalive 64;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name storage.creatu.app;

    return 301 https://$server_name$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storage.creatu.app;

    ssl_certificate /etc/letsencrypt/live/storage.creatu.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.creatu.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://appforge_storage;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # MinIO bucket redirection
      proxy_redirect ~^http://(.*)$ https://$1;
    }
  }

  # ============================================================================
  # Catch-all para certificados ACME de Let's Encrypt
  # ============================================================================
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }
}
