# ============================================================================
# AppForge SaaS — Main Nginx Configuration
# Path: /etc/nginx/nginx.conf
#
# Contains: global directives, http block settings, gzip, security headers,
#           rate-limit zones, includes for sites-enabled and conf.d.
#
# Site-specific server blocks live in:
#   /etc/nginx/sites-available/appforge.conf
#   (symlinked from /etc/nginx/sites-enabled/)
# ============================================================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ─── Performance ──────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ─── Upload limits (applies to ALL server blocks unless overridden) ───────
  client_max_body_size 100M;
  client_body_timeout 120s;

  # ─── Gzip compression ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/rss+xml application/atom+xml application/xhtml+xml
    font/truetype font/opentype application/vnd.ms-fontobject
    image/svg+xml;

  # ─── Security headers (sent on every response) ────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # ─── Rate limiting zones (used per-server with limit_req) ─────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=500r/m;

  # ─── SSL hardening (defaults inherited by all server blocks) ──────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ─── Site configurations ──────────────────────────────────────────────────
  include /etc/nginx/conf.d/*.conf;
  include /etc/nginx/sites-enabled/*;
}