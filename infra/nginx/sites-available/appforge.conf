# ============================================================================
# AppForge SaaS — Site Configuration
# Path: /etc/nginx/sites-available/appforge.conf
#
# DEPLOYMENT STAGE: 1 of 2
#   Stage 1 (this file): only api.creatu.app is active over HTTPS.
#                        app/admin/storage are HTTP-only (for ACME challenges)
#                        until certificates are issued.
#   Stage 2: uncomment the HTTPS blocks for app/admin/storage after certbot
#            has issued their certificates.
#
# Subdomains:
#   - api.creatu.app      → reverse proxy to localhost:3000 (NestJS API)
#   - app.creatu.app      → static SPA from appforge-builder/dist  [STAGE 2]
#   - admin.creatu.app    → static SPA from appforge-admin/dist    [STAGE 2]
#   - storage.creatu.app  → reverse proxy to localhost:9000 (MinIO) [STAGE 2]
#
# Global directives (client_max_body_size, gzip, ssl_*, etc.) are inherited
# from /etc/nginx/nginx.conf — do NOT redefine them here.
# ============================================================================


# ──────────────────────────────────────────────────────────────────────────────
# api.creatu.app — NestJS Backend (HTTPS active)
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_api {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name api.creatu.app;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/api.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://appforge_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_request_buffering off;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location /health {
    proxy_pass http://appforge_api;
    access_log off;
  }
}


# ──────────────────────────────────────────────────────────────────────────────
# app.creatu.app — React Builder SPA
# Stage 1: HTTP-only for ACME challenge. Stage 2: enable HTTPS block below.
# ──────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name app.creatu.app;

  root /opt/appforge/appforge-builder/dist;
  index index.html;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}

