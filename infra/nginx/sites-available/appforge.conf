# ============================================================================
# AppForge SaaS — Site Configuration
# Path: /etc/nginx/sites-available/appforge.conf
# Symlinked to: /etc/nginx/sites-enabled/appforge.conf
#
# Subdomains:
#   - api.creatu.app      → localhost:3000  (NestJS API)
#   - app.creatu.app      → localhost:5000  (React Builder SPA)
#   - admin.creatu.app    → localhost:5001  (React Admin Panel SPA)
#   - storage.creatu.app  → localhost:9000  (MinIO S3)
#
# All directives like client_max_body_size, gzip, ssl_protocols, etc.
# are inherited from /etc/nginx/nginx.conf — do NOT redefine them here.
# ============================================================================

# ──────────────────────────────────────────────────────────────────────────────
# api.creatu.app → NestJS Backend
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_api {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name api.creatu.app;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/api.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://appforge_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streaming uploads (bypass nginx buffering for large files)
    proxy_buffering off;
    proxy_request_buffering off;

    # Timeouts for long-running operations (e.g. APK builds)
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location /health {
    proxy_pass http://appforge_api;
    access_log off;
  }
}

# ──────────────────────────────────────────────────────────────────────────────
# app.creatu.app → React Builder SPA
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_builder {
  server 127.0.0.1:5000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name app.creatu.app;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name app.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/app.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    limit_req zone=general_limit burst=50 nodelay;

    proxy_pass http://appforge_builder;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    error_page 404 =200 /index.html;
  }
}

