# ──────────────────────────────────────────────────────────────────────────────
# storage.creatu.app — MinIO S3
# Stage 1: HTTP-only for ACME challenge. Stage 2: enable HTTPS block below.
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_storage {
  server 127.0.0.1:9000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name storage.creatu.app;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

