# ──────────────────────────────────────────────────────────────────────────────
# storage.creatu.app — MinIO S3 (reverse proxy)
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_storage {
  server 127.0.0.1:9000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name storage.creatu.app;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name storage.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/storage.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/storage.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://appforge_storage;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect ~^http://(.*)$ https://$1;
  }
}
# apps.creatu.app — PWAs estáticas servidas por nginx
server {
  listen 80;
  listen [::]:80;
  server_name apps.creatu.app;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$server_name$request_uri; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name apps.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/apps.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/apps.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;

  root /var/www/apps;

  location = / { return 404; }

  location ~* ^/(?<sw_slug>[^/]+)/sw\.js$ {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Service-Worker-Allowed "/$sw_slug/" always;
    try_files $uri =404;
  }

  location ~* \.(webmanifest|html)$ {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location ~* \.(js|css|woff2?|ttf|eot|webp|avif|png|jpg|jpeg|gif|svg|ico)$ {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ~ ^/(?<slug>[^/]+)/ {
    limit_req zone=general_limit burst=50 nodelay;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri /$slug/index.html =404;
  }
}

# ──────────────────────────────────────────────────────────────────────────────
# preview.creatu.app — Runtime preview iframe (static, same bundle as PWA/AAB)
# Serves the real runtime so the builder can embed it as an iframe.
# X-Frame-Options omitted intentionally — Content-Security-Policy frame-ancestors
# controls framing (modern browsers ignore X-Frame-Options when CSP is present).
# ──────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name preview.creatu.app;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name preview.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/preview.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/preview.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "frame-ancestors 'self' https://app.creatu.app https://builder.creatu.app" always;

  root /var/www/preview-runtime/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    try_files $uri =404;
  }
}