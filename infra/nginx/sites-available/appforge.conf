# ──────────────────────────────────────────────────────────────────────────────
# admin.creatu.app — React Admin Panel SPA
# Stage 1: HTTP-only for ACME challenge. Stage 2: enable HTTPS block below.
# ──────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name admin.creatu.app;

  root /opt/appforge/appforge-admin/dist;
  index index.html;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}

