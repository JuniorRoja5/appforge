# ──────────────────────────────────────────────────────────────────────────────
# storage.creatu.app — MinIO S3 (reverse proxy)
# ──────────────────────────────────────────────────────────────────────────────
upstream appforge_storage {
  server 127.0.0.1:9000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name storage.creatu.app;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name storage.creatu.app;

  ssl_certificate     /etc/letsencrypt/live/storage.creatu.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/storage.creatu.app/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://appforge_storage;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect ~^http://(.*)$ https://$1;
  }
}